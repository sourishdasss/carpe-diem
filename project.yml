# Optional: run `brew install xcodegen` then `xcodegen` to generate Sonder.xcodeproj
name: Sonder
options:
  bundleIdPrefix: com.sonder
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  Sonder:
    type: application
    platform: iOS
    sources:
      - path: Sonder
        excludes:
          - "*.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sonder.app
        INFOPLIST_FILE: Sonder/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: Supabase
        product: Supabase
